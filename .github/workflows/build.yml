name: Build Collection

on:
  repository_dispatch:
    types: [module-released]
  workflow_dispatch:
    inputs:
      module:
        description: 'Module that triggered the build (optional, informational)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout KIParla-collection
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas

      - name: Clone module repos
        run: |
          git clone --depth 1 https://github.com/KIParla/KIP.git      /tmp/KIP
          git clone --depth 1 https://github.com/KIParla/KIPasti.git  /tmp/KIPasti
          git clone --depth 1 https://github.com/KIParla/ParlaBO.git  /tmp/ParlaBO
          git clone --depth 1 https://github.com/KIParla/ParlaTO.git  /tmp/ParlaTO

      - name: Sync TSV files
        run: |
          for module in KIP KIPasti ParlaBO ParlaTO; do
            if [ -d "/tmp/$module/tsv" ]; then
              cp /tmp/$module/tsv/*.tsv tsv/ 2>/dev/null || true
            fi
          done

      - name: Sync EAF files
        run: |
          for module in KIP KIPasti ParlaBO ParlaTO; do
            if [ -d "/tmp/$module/eaf" ]; then
              cp /tmp/$module/eaf/*.eaf eaf/ 2>/dev/null || true
            fi
          done

      - name: Clone tools repo
        run: git clone --depth 1 https://github.com/KIParla/tools.git /tmp/tools

      - name: Regenerate linear formats
        run: |
          python /tmp/tools/tsv2formats.py \
            -i tsv/ \
            --out_jefferson linear-jefferson \
            --out_orthographic linear-orthographic

      - name: Merge metadata
        run: |
          python /tmp/tools/merge_metadata.py \
            --modules /tmp/KIP /tmp/KIPasti /tmp/ParlaBO /tmp/ParlaTO \
            --output-dir metadata/

      - name: Bump collection version
        id: bump
        run: |
          # Increment the patch segment of the version in CITATION.cff
          CURRENT=$(grep '^version:' CITATION.cff | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version:.*/version: $NEW_VERSION/" CITATION.cff
          sed -i "s/^date-released:.*/date-released: $(date +%Y-%m-%d)/" CITATION.cff
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tsv/ eaf/ linear-jefferson/ linear-orthographic/ metadata/ CITATION.cff
          if ! git diff --cached --quiet; then
            TRIGGER="${{ github.event.client_payload.module || github.event.inputs.module || 'manual' }}"
            git commit -m "chore: rebuild collection v${{ steps.bump.outputs.version }} (trigger: $TRIGGER)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and create GitHub Release
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.bump.outputs.version }}';
            const trigger = '${{ github.event.client_payload.module || github.event.inputs.module || 'manual' }}';
            const releaseUrl = '${{ github.event.client_payload.release_url || '' }}';

            // Create the tag
            const sha = context.sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${version}`,
              sha: sha,
            });

            // Create the release
            const body = releaseUrl
              ? `Rebuilt from module release: ${releaseUrl}`
              : `Rebuilt manually.`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: body,
              draft: false,
              prerelease: false,
            });
